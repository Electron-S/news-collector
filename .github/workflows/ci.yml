name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: |
          for f in collect.js mailer.js feedback.js weekly.js enrich.js collect-telegram.js alert.js config.js lib/*.js test/*.js; do
            node -c "$f"
          done
      - name: Unit tests
        run: node --test
